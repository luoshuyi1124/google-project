<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: sans-serif;
        width: 220px;
        padding: 16px;
        background: #1a1a1a;
        color: #fff;
        margin: 0;
      }
      h2 {
        margin: 0 0 16px;
        font-size: 12px;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
      }
      .label {
        font-size: 13px;
      }
      .switch {
        position: relative;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
      }
      .switch input {
        display: none;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #555;
        border-radius: 22px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .slider::before {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s;
      }
      input:checked + .slider {
        background: #4caf50;
      }
      input:checked + .slider::before {
        transform: translateX(18px);
      }
    </style>
  </head>
  <body>
    <h2>YouTube Focus</h2>
    <div class="row">
      <span class="label">Productivity Mode</span>
      <label class="switch">
        <input type="checkbox" id="productivityMode" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <span class="label">Block Shorts</span>
      <label class="switch">
        <input type="checkbox" id="blockShorts" />
        <span class="slider"></span>
      </label>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
